<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <!-- Light Mode Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7d32" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
    
    <!-- Gold Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb300" />
      <stop offset="100%" stop-color="#ffe082" />
    </linearGradient>
  </defs>

  <!-- Logo Shape: Shield / Leaf Contour -->
  <path d="M 50 10 
           C 70 10, 85 20, 85 45 
           C 85 70, 65 85, 50 92 
           C 35 85, 15 70, 15 45 
           C 15 20, 30 10, 50 10 Z" 
        fill="none" 
        stroke="url(#brand-grad)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- The Trophy Cup combined with Leaf Vein details -->
  <!-- Base of the trophy -->
  <path d="M 38 78 L 62 78 M 50 78 L 50 68" 
        stroke="url(#gold-grad)" 
        stroke-width="5" 
        stroke-linecap="round" />
  
  <!-- Trophy Cup Body / Organic Leaf Shape -->
  <path d="M 30 40 
           C 30 65, 70 65, 70 40 
           C 70 30, 60 25, 50 25 
           C 40 25, 30 30, 30 40 Z" 
        fill="url(#brand-grad)" 
        opacity="0.15" />
        
  <path d="M 30 40 
           C 30 63, 70 63, 70 40 
           C 70 30, 60 25, 50 25 
           C 40 25, 30 30, 30 40 Z" 
        fill="none" 
        stroke="url(#gold-grad)" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Trophy Handles resembling sprouting leaves -->
  <path d="M 30 36 C 20 32, 22 50, 31 48" 
        fill="none" 
        stroke="url(#gold-grad)" 
        stroke-width="3" 
        stroke-linecap="round" />
  <path d="M 70 36 C 80 32, 78 50, 69 48" 
        fill="none" 
        stroke="url(#gold-grad)" 
        stroke-width="3" 
        stroke-linecap="round" />

  <!-- Center Leaf Vein running up through the trophy -->
  <path d="M 50 60 C 50 45, 50 30, 50 20" 
        fill="none" 
        stroke="url(#brand-grad)" 
        stroke-width="3" 
        stroke-linecap="round" />
        
  <!-- Delicate leaf lobes inside the cup -->
  <path d="M 50 48 C 58 44, 58 40, 50 36 C 42 40, 42 44, 50 48 Z" 
        fill="url(#brand-grad)" />

  <!-- 3 Stars of Excellence (Top 3) above the trophy -->
  <path d="M 50 14 L 51 17 L 54 17 L 51.5 19 L 52.5 22 L 50 20 L 47.5 22 L 48.5 19 L 46 17 L 49 17 Z" fill="url(#gold-grad)" />
  <path d="M 35 18 L 36 21 L 39 21 L 36.5 23 L 37.5 26 L 35 24 L 32.5 26 L 33.5 23 L 31 21 L 34 21 Z" fill="url(#gold-grad)" />
  <path d="M 65 18 L 66 21 L 69 21 L 66.5 23 L 67.5 26 L 65 24 L 62.5 26 L 63.5 23 L 61 21 L 64 21 Z" fill="url(#gold-grad)" />
</svg>
